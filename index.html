<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNG Frontend Wizards - Task Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <form class="task-form" id="todoForm" data-testid="test-todo-form">
        <h2 id="formTitle">Manage Tasks</h2>
        <input type="hidden" id="editId">
        
        <input type="text" id="inputTitle" placeholder="Task Title" required data-testid="test-todo-title-input">
        <textarea id="inputDesc" placeholder="Task Description..." rows="2" required data-testid="test-todo-description-input"></textarea>
        
        <div class="grid">
            <div>
                <label>Priority</label>
                <select id="inputPriority" data-testid="test-todo-priority-select">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>
            </div>
            <div>
                <label>Due Date</label>
                <input type="datetime-local" id="inputDateTime" required data-testid="test-todo-due-date-input">
            </div>
        </div>
        
        <button type="submit" class="btn-main" id="submitBtn">Add Task</button>
        <button type="button" id="cancelEdit" class="cancel-btn">Cancel Edit</button>
    </form>

    <div id="todoList"></div>
</div>

<script src="script.js"></script>
</body>
</html>
